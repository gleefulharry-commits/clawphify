name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install networkx tree-sitter
    
    - name: Test import
      run: |
        python -c "from clawphify import get_builtin_graph_path; print('Import OK')"
    
    - name: Check graph JSON
      run: |
        python -c "import json; data = json.load(open('clawphify/data/openclaw_graph.json')); print(f'Graph: {len(data[\"nodes\"])} nodes, {len(data[\"edges\"])} edges')"
